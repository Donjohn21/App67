name: app67
description: "Vehicle Manager App - ITLA Final Project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & Networking
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.3

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.6.2

  # Image handling
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # UI components
  carousel_slider: ^5.0.0
  flutter_html: ^3.0.0-alpha.6
  smooth_page_indicator: ^1.2.0+3

  # YouTube player
  youtube_player_iframe: ^5.2.2

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
